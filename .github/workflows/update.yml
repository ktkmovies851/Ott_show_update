name: Update OTT

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🔥 IMPORTANT FIX (Playwright system dependencies)
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install
          playwright install-deps

      # Optional (debug)
      - name: Show files
        run: ls -R

      # Run your script
      - name: Run script
        run: python Ottupdate.py

      # Commit only if changes exist
      - name: Commit & Push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add data/*.json

          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "auto update"
            git push
          fi
