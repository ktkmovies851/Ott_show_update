name: Update OTT

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install -r requirements.txt
          playwright install

      - run: python update_ott.py

      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add data/*.json
          git commit -m "auto update" || echo "no change"
          git push
